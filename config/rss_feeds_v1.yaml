# AI 内容工厂 RSS 源 V2 Pro
# 用法：将本文件中的 rss: 整段替换 config.yaml 里的 rss: 配置
# 目标：发现新内容后尽快抓取，AI 分析后立即推送，不做时间段汇总

rss:
  enabled: true

  # 只抓取最近内容，避免旧新闻重复推送
  freshness_filter:
    enabled: true
    max_age_days: 1

  # 建议配合主配置中的调度改为高频轮询，例如每 5-15 分钟运行一次
  # 如果你的主程序支持以下字段，可以保留；不支持也不会影响 feeds 列表本身
  realtime_mode:
    enabled: true
    push_after_analysis: true
    batch_summary: false

  feeds:
    # ===== NBA / 篮球 =====
